name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # --- HARD GATES (must pass to merge) ---

      # [APX-SEC] Hard gate on High/Critical advisories in SHIPPED code only
      # (--omit=dev). Dev-only tooling (vitest/vite-node/esbuild dev server,
      # jsdom->undici) never reaches the bundle, so it must not block merges.
      - name: Audit shipped deps (fail on high/critical)
        run: npm audit --audit-level=high --omit=dev

      # Full-tree audit incl. devDependencies — informational, tracks tooling
      # advisories without blocking. Burn these down via `npm audit fix`.
      - name: Audit all deps (non-blocking)
        run: npm audit --audit-level=high
        continue-on-error: true

      # Type-check the migrated .ts/.tsx (tsc is check-only; Vite does the build).
      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # Coverage gate: global ratchet + ≥60% bar on critical paths (see
      # vitest.config.js thresholds).
      - name: Coverage gate
        run: npm run test:coverage

      - name: Production build
        run: npm run build
        env:
          # Build only needs these present; real values come from the host.
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: build-placeholder

      # --- RATCHET (reports, does not block yet) ---
      # ESLint is informational while the legacy warning debt is burned down.
      # `no-undef` (real ReferenceError bugs) is already at zero — tighten this
      # to a hard gate once warnings are cleared. See docs/TESTING.md.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
